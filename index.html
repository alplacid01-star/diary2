<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>나의 일기장</title>
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="나의 일기장">
<meta name="theme-color" content="#2c1f14">
<meta name="description" content="나만의 소중한 일기장">

<script>
// ── PWA Manifest & Icon 인라인 생성 ──
const iconSVG = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF3C4"/>
      <stop offset="100%" stop-color="#FFD95A"/>
    </linearGradient>
    <linearGradient id="pg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fffbee"/>
    </linearGradient>
    <linearGradient id="sp" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F5A623"/>
      <stop offset="100%" stop-color="#F7C948"/>
    </linearGradient>
  </defs>
  <!-- 배경 -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <!-- 햇살 -->
  <circle cx="256" cy="256" r="210" fill="#FFE566" opacity="0.35"/>
  <!-- 책 그림자 -->
  <rect x="138" y="95" width="244" height="336" rx="14" fill="#e8a800" opacity="0.2"/>
  <!-- 책 본체 -->
  <rect x="130" y="86" width="244" height="336" rx="14" fill="url(#pg)"/>
  <!-- 책 척추 -->
  <rect x="130" y="86" width="32" height="336" rx="14" fill="url(#sp)"/>
  <rect x="152" y="86" width="10" height="336" fill="#F7C948" opacity="0.5"/>
  <!-- 구분선 -->
  <line x1="175" y1="160" x2="350" y2="160" stroke="#FFE0A0" stroke-width="2"/>
  <!-- 노트 줄 -->
  <line x1="175" y1="198" x2="348" y2="198" stroke="#FFE8B0" stroke-width="3" stroke-linecap="round"/>
  <line x1="175" y1="226" x2="342" y2="226" stroke="#FFE8B0" stroke-width="3" stroke-linecap="round"/>
  <line x1="175" y1="254" x2="336" y2="254" stroke="#FFE8B0" stroke-width="3" stroke-linecap="round"/>
  <line x1="175" y1="282" x2="344" y2="282" stroke="#FFE8B0" stroke-width="3" stroke-linecap="round"/>
  <line x1="175" y1="310" x2="320" y2="310" stroke="#FFE8B0" stroke-width="3" stroke-linecap="round"/>
  <!-- 날짜 뱃지 -->
  <rect x="175" y="108" width="72" height="28" rx="7" fill="#FFD95A" opacity="0.5"/>
  <!-- 연필 -->
  <g transform="translate(316,320) rotate(-40)">
    <rect x="-12" y="-65" width="24" height="82" rx="5" fill="#F5A623"/>
    <polygon points="-12,17 12,17 0,42" fill="#E8860A"/>
    <rect x="-12" y="-65" width="24" height="14" rx="5" fill="#E07A10"/>
    <rect x="-12" y="-20" width="24" height="5" fill="#fff" opacity="0.3"/>
  </g>
</svg>`;

window.addEventListener('DOMContentLoaded', () => {
  const iconBlob = new Blob([iconSVG], {type:'image/svg+xml'});
  const iconUrl = URL.createObjectURL(iconBlob);

  const manifest = {
    name: "나의 일기장",
    short_name: "일기장",
    description: "나만의 소중한 일기장",
    start_url: "./",
    display: "standalone",
    background_color: "#FFD95A",
    theme_color: "#F5A623",
    orientation: "portrait",
    icons: [
      {src: iconUrl, sizes:"192x192", type:"image/svg+xml", purpose:"any maskable"},
      {src: iconUrl, sizes:"512x512", type:"image/svg+xml", purpose:"any maskable"}
    ]
  };
  const mBlob = new Blob([JSON.stringify(manifest)], {type:'application/json'});
  const mLink = document.createElement('link');
  mLink.rel = 'manifest'; mLink.href = URL.createObjectURL(mBlob);
  document.head.appendChild(mLink);

  const aLink = document.createElement('link');
  aLink.rel = 'apple-touch-icon'; aLink.href = iconUrl;
  document.head.appendChild(aLink);
});

// ── Service Worker ──
if ('serviceWorker' in navigator) {
  const sw = `
    self.addEventListener('install', () => self.skipWaiting());
    self.addEventListener('activate', e => e.waitUntil(clients.claim()));
    self.addEventListener('fetch', e => e.respondWith(
      caches.match(e.request).then(r => r || fetch(e.request).catch(() => new Response('')))
    ));
  `;
  const swBlob = new Blob([sw], {type:'application/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(swBlob)).catch(()=>{});
}
</script>

<link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
  :root {
    --bg: #F6F1E8;
    --brown: #5C3D2E;
    --orange: #E07A45;
    --green: #5A8A68;
    --blue: #5E8FAA;
    --rose: #C96868;
    --gold: #B88A30;
    --ink: #2e1f10; --ink-light: #7a6050;
    --paper: #fffdf8; --paper-warm: #faf5ef; --paper-line: #ede5d8;
    --accent: #E07A45; --accent-light: #e8956a; --fade: #b0998a;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  body {
    background: var(--bg);
    min-height: 100dvh;
    font-family: 'Nanum Gothic', sans-serif;
    display: flex; flex-direction: column; align-items: center;
    padding: 40px 20px;
    background-image: radial-gradient(ellipse at 20% 30%, #f0e8d8 0%, transparent 55%),
                      radial-gradient(ellipse at 80% 75%, #eae8f0 0%, transparent 50%);
  }

  /* Install Banner */
  #installBanner {
    display: none; position: fixed; bottom:0; left:0; right:0;
    background: #fff8f0; border-top: 1px solid rgba(92,61,46,0.15);
    padding: 14px 20px; z-index: 999;
    align-items: center; gap: 12px;
    box-shadow: 0 -4px 20px rgba(92,61,46,0.1);
  }
  #installBanner.show { display: flex; }
  .banner-icon { width:44px; height:44px; background:#fdf0e8; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:24px; flex-shrink:0; border:1px solid rgba(224,122,69,0.2); }
  .banner-text { flex:1; }
  .banner-text strong { display:block; color:var(--brown); font-size:0.85rem; margin-bottom:2px; }
  .banner-text span { color:var(--fade); font-size:0.72rem; }
  .banner-install { background:var(--orange); color:white; border:none; padding:8px 16px; border-radius:6px; font-family:'Nanum Gothic',sans-serif; font-size:0.8rem; font-weight:700; cursor:pointer; white-space:nowrap; }
  .banner-close { background:none; border:none; color:var(--fade); font-size:1.2rem; cursor:pointer; padding:4px; flex-shrink:0; }

  /* Header */
  .app-header { text-align:center; margin-bottom:36px; color:var(--brown); }
  .app-header h1 { font-size:2.2rem; font-weight:800; letter-spacing:0.08em; text-shadow:0 2px 12px rgba(92,61,46,0.15); }
  .app-header .subtitle { font-size:0.75rem; letter-spacing:0.3em; color:var(--fade); margin-top:6px; text-transform:uppercase; }

  /* Layout */
  .container { width:100%; max-width:860px; display:grid; grid-template-columns:260px 1fr; border-radius:16px; overflow:hidden; box-shadow:0 20px 50px rgba(92,61,46,0.12),0 0 0 1px rgba(92,61,46,0.08); }

  /* Sidebar */
  .sidebar { background:#fff8f2; border-right:1px solid #ede5d8; display:flex; flex-direction:column; min-height:600px; }
  .sidebar-header { padding:20px 16px 14px; border-bottom:1px solid #ede5d8; background:var(--blue); }
  .sidebar-header h2 { color:rgba(255,255,255,0.9); font-size:0.9rem; letter-spacing:0.1em; margin-bottom:12px; }
  .search-box { width:100%; background:rgba(255,255,255,0.15); border:1px solid rgba(255,255,255,0.25); border-radius:8px; padding:7px 10px; color:white; font-size:0.78rem; font-family:'Nanum Gothic',sans-serif; outline:none; transition:border-color 0.2s; }
  .search-box::placeholder { color:rgba(255,255,255,0.5); }
  .search-box:focus { border-color:rgba(255,255,255,0.5); }
  .entries-list { flex:1; overflow-y:auto; padding:8px 0; }
  .entries-list::-webkit-scrollbar { width:3px; }
  .entries-list::-webkit-scrollbar-thumb { background:rgba(92,61,46,0.15); border-radius:2px; }
  .entry-item { padding:10px 16px; cursor:pointer; border-left:3px solid transparent; transition:all 0.15s; border-bottom:1px solid #f5efe8; }
  .entry-item:hover { background:#fff2e8; border-left-color:var(--orange); }
  .entry-item.active { background:#fff0e4; border-left-color:var(--orange); }
  .entry-item .date-label { font-size:0.72rem; color:var(--orange); margin-bottom:3px; font-weight:700; }
  .entry-item .preview { font-size:0.75rem; color:var(--fade); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; line-height:1.4; }
  .no-entries { padding:30px 16px; text-align:center; color:var(--fade); font-size:0.75rem; line-height:1.8; }
  .sidebar-footer { padding:14px 16px; border-top:1px solid #ede5d8; display:flex; flex-direction:column; gap:8px; }
  .btn-new { width:100%; background:var(--orange); color:white; border:none; padding:9px 12px; border-radius:8px; font-family:'Nanum Gothic',sans-serif; font-size:0.85rem; cursor:pointer; transition:background 0.2s; font-weight:700; }
  .btn-new:hover { background:var(--accent-light); }
  .btn-pdf { width:100%; background:transparent; color:var(--brown); border:1px solid rgba(92,61,46,0.25); padding:8px 12px; border-radius:8px; font-family:'Nanum Gothic',sans-serif; font-size:0.75rem; cursor:pointer; transition:all 0.2s; }
  .btn-pdf:hover { background:#fff2e8; border-color:var(--orange); color:var(--orange); }
  .entry-count-badge { display:inline-block; background:rgba(255,255,255,0.2); color:rgba(255,255,255,0.9); font-size:0.68rem; padding:2px 8px; border-radius:10px; margin-left:8px; }

  /* Editor */
  .editor-pane { background:var(--paper); display:flex; flex-direction:column; position:relative; }
  .editor-pane::before { content:''; position:absolute; inset:0; background-image:repeating-linear-gradient(to bottom, transparent 0px, transparent 31px, var(--paper-line) 31px, var(--paper-line) 32px); background-position:0 60px; pointer-events:none; opacity:0.35; }
  .editor-header { padding:24px 36px 16px; border-bottom:1px solid var(--paper-line); position:relative; z-index:1; background:var(--paper); }
  .date-row { display:flex; align-items:center; justify-content:space-between; margin-bottom:4px; }
  #datePicker {
    background: #fff8f0;
    border: 1px solid rgba(224,122,69,0.3);
    border-radius: 8px;
    padding: 5px 8px;
    font-family: 'Nanum Gothic', sans-serif;
    font-size: 0.78rem;
    color: var(--ink-light);
    cursor: pointer;
    outline: none;
    transition: border-color 0.2s;
  }
  #datePicker:focus { border-color: var(--gold); }
  #datePicker::-webkit-calendar-picker-indicator { opacity: 0.5; cursor: pointer; }
  .date-display { font-size:1.5rem; color:var(--brown); font-weight:700; margin-bottom:4px; }
  .weekday-display { font-size:0.75rem; color:var(--fade); letter-spacing:0.15em; }
  .weather-mood { display:flex; gap:8px; margin-top:14px; flex-wrap:wrap; }
  .mood-btn { background:#faf5ef; border:1px solid #ede5d8; border-radius:20px; padding:4px 12px; font-size:0.72rem; color:var(--ink-light); cursor:pointer; transition:all 0.15s; font-family:'Nanum Gothic',sans-serif; }
  .mood-btn:nth-child(1).selected { background:#fff8e8; border-color:var(--gold); color:var(--gold); }
  .mood-btn:nth-child(2).selected { background:#f0f5ff; border-color:var(--blue); color:var(--blue); }
  .mood-btn:nth-child(3).selected { background:#eef8ff; border-color:var(--blue); color:var(--blue); }
  .mood-btn:nth-child(4).selected { background:#eef6ee; border-color:var(--green); color:var(--green); }
  .mood-btn:nth-child(5).selected { background:#fff5ee; border-color:var(--orange); color:var(--orange); }
  .mood-btn:nth-child(6).selected { background:#fff0f0; border-color:var(--rose); color:var(--rose); }
  .mood-btn:hover { border-color:var(--orange); color:var(--orange); background:#fff8f2; }
  .editor-body { flex:1; padding:20px 36px; position:relative; z-index:1; display:flex; flex-direction:column; gap:10px; }
  .title-input { width:100%; background:none; border:none; outline:none; font-family:'Nanum Gothic',sans-serif; font-size:1.15rem; font-weight:700; color:var(--ink); letter-spacing:-0.01em; border-bottom:1px solid var(--paper-line); padding-bottom:8px; margin-bottom:4px; }
  .title-input::placeholder { color:var(--paper-line); }
  .content-textarea { flex:1; width:100%; background:none; border:none; outline:none; font-family:'Nanum Gothic',sans-serif; font-size:1rem; color:var(--ink); line-height:2.0; resize:none; min-height:380px; letter-spacing:-0.01em; }
  .content-textarea::placeholder { color:#ccc0b0; }
  .editor-footer { padding:14px 36px; border-top:1px solid var(--paper-line); display:flex; justify-content:space-between; align-items:center; background:var(--paper-warm); position:relative; z-index:1; }
  .char-count { font-size:0.72rem; color:var(--fade); }
  .footer-actions { display:flex; gap:10px; align-items:center; }
  .btn-delete { background:none; border:1px solid #f0d8d8; color:var(--rose); padding:7px 16px; border-radius:8px; font-size:0.78rem; cursor:pointer; font-family:'Nanum Gothic',sans-serif; transition:all 0.2s; }
  .btn-delete:hover { background:#fff0f0; }
  .btn-save { background:var(--green); color:white; border:none; padding:8px 22px; border-radius:8px; font-family:'Nanum Gothic',sans-serif; font-size:0.85rem; cursor:pointer; transition:background 0.2s; font-weight:700; }
  .btn-save:hover { background:#6a9e78; }
  .btn-save.saved { background:var(--blue); }

  /* Toast */
  .toast { position:fixed; bottom:30px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--brown); color:#fff8f0; padding:10px 24px; border-radius:20px; font-size:0.82rem; opacity:0; transition:all 0.3s; z-index:500; pointer-events:none; white-space:nowrap; box-shadow:0 4px 16px rgba(92,61,46,0.25); }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

  /* Modal */
  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(92,61,46,0.2); backdrop-filter:blur(4px); z-index:200; align-items:center; justify-content:center; }
  .modal-overlay.open { display:flex; }
  .modal { background:var(--paper); border-radius:16px; padding:32px; width:360px; max-width:90vw; box-shadow:0 20px 60px rgba(92,61,46,0.18); }
  .modal h3 { font-size:1.1rem; color:var(--brown); margin-bottom:20px; padding-bottom:12px; border-bottom:1px solid var(--paper-line); }
  .modal label { font-size:0.78rem; color:var(--ink-light); display:block; margin-bottom:6px; margin-top:14px; }
  .modal select { width:100%; padding:8px 10px; border:1px solid var(--paper-line); border-radius:8px; font-family:'Nanum Gothic',sans-serif; font-size:0.82rem; color:var(--ink); background:white; outline:none; }
  .modal-info { margin-top:14px; padding:10px 14px; background:#fff8f0; border-radius:8px; font-size:0.75rem; color:var(--ink-light); line-height:1.7; border:1px solid #f0e8d8; }
  .modal-actions { display:flex; gap:10px; margin-top:22px; }
  .modal-cancel { flex:1; background:none; border:1px solid var(--paper-line); padding:9px; border-radius:8px; cursor:pointer; font-family:'Nanum Gothic',sans-serif; font-size:0.82rem; color:var(--ink-light); }
  .modal-confirm { flex:2; background:var(--orange); color:white; border:none; padding:9px; border-radius:8px; cursor:pointer; font-family:'Nanum Gothic',sans-serif; font-size:0.85rem; font-weight:700; }

  @media (max-width:640px) {
    body { padding:0 0 70px; background:var(--bg); }
    .app-header { display:none; }
    .container { grid-template-columns:1fr; border-radius:0; box-shadow:none; min-height:100dvh; }

    /* 모바일: 사이드바 → 하단 드로어 */
    .sidebar {
      position: fixed; bottom:70px; left:0; right:0;
      max-height: 0; overflow:hidden;
      transition: max-height 0.3s ease;
      z-index: 50; border-radius:20px 20px 0 0;
      box-shadow: 0 -4px 24px rgba(92,61,46,0.15);
      min-height: auto;
    }
    .sidebar.open { max-height: 65vh; }
    .sidebar-header { padding:16px 16px 12px; }
    .sidebar-header h2::before { content:'📋 '; }
    .entries-list { max-height: calc(65vh - 130px); overflow-y:auto; }

    /* 하단 네비게이션 바 */
    .bottom-nav {
      display: flex; position:fixed; bottom:0; left:0; right:0; height:70px;
      background:white; border-top:1px solid #ede5d8;
      box-shadow: 0 -2px 16px rgba(92,61,46,0.1);
      z-index: 100;
    }
    .nav-btn {
      flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
      gap:4px; border:none; background:none; cursor:pointer;
      font-family:'Nanum Gothic',sans-serif; font-size:0.6rem; color:var(--fade);
      transition: color 0.15s;
    }
    .nav-btn .nav-icon { font-size:1.4rem; line-height:1; }
    .nav-btn.active { color:var(--orange); }
    .nav-btn.nav-write { background:var(--orange); color:white; border-radius:16px; margin:10px; flex:1.2; font-size:0.65rem; font-weight:700; }

    .editor-pane { min-height:calc(100dvh - 70px); }
    .editor-header { padding:20px 20px 14px; padding-top: calc(env(safe-area-inset-top) + 20px); }
    .editor-body { padding:14px 20px; }
    .editor-footer { padding:12px 20px; }
    .content-textarea { min-height:calc(100dvh - 340px); }
    .sidebar-footer { display:none; }
  }
  @media (min-width:641px) {
    .bottom-nav { display:none; }
  }
</style>
</head>
<body>

<div id="installBanner">
  <div class="banner-icon">📔</div>
  <div class="banner-text">
    <strong>홈 화면에 추가하기</strong>
    <span>앱처럼 바로 열 수 있어요</span>
  </div>
  <button class="banner-install" id="installBtn">설치</button>
  <button class="banner-close" onclick="dismissBanner()">✕</button>
</div>

<div class="app-header">
  <h1>나의 일기장</h1>
  <div class="subtitle">My Private Diary</div>
</div>

<div class="container">
  <div class="sidebar">
    <div class="sidebar-header">
      <h2>기록 목록 <span class="entry-count-badge" id="entryCount">0</span></h2>
      <input class="search-box" type="text" id="searchBox" placeholder="검색..." oninput="filterEntries()">
    </div>
    <div class="entries-list" id="entriesList">
      <div class="no-entries">아직 기록이 없어요.<br>새 일기를 써보세요 ✍️</div>
    </div>
    <div class="sidebar-footer">
      <button class="btn-new" onclick="newEntry()">+ 새 일기 쓰기</button>
      <button class="btn-pdf" onclick="openPdfModal()">📄 PDF로 내보내기</button>
    </div>
  </div>

  <div class="editor-pane">
    <div class="editor-header">
      <div class="date-row">
        <div>
          <div class="date-display" id="dateDisplay"></div>
          <div class="weekday-display" id="weekdayDisplay"></div>
        </div>
        <input type="date" id="datePicker" onchange="onDateChange(this.value)">
      </div>
      <div class="weather-mood">
        <button class="mood-btn" onclick="toggleMood(this,'☀️ 맑음')">☀️ 맑음</button>
        <button class="mood-btn" onclick="toggleMood(this,'🌥️ 흐림')">🌥️ 흐림</button>
        <button class="mood-btn" onclick="toggleMood(this,'🌧️ 비')">🌧️ 비</button>
        <button class="mood-btn" onclick="toggleMood(this,'😊 좋음')">😊 좋음</button>
        <button class="mood-btn" onclick="toggleMood(this,'😐 보통')">😐 보통</button>
        <button class="mood-btn" onclick="toggleMood(this,'😔 우울')">😔 우울</button>
      </div>
    </div>
    <div class="editor-body">
      <input class="title-input" id="titleInput" type="text" placeholder="제목 (선택사항)">
      <textarea class="content-textarea" id="contentTextarea" placeholder="오늘 하루를 기록해보세요..."></textarea>
    </div>
    <div class="editor-footer">
      <div class="char-count" id="charCount">0자</div>
      <div class="footer-actions">
        <button class="btn-delete" id="deleteBtn" onclick="deleteEntry()" style="display:none">삭제</button>
        <button class="btn-save" id="saveBtn" onclick="saveEntry()">저장하기</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
  <div class="modal">
    <h3>📄 PDF로 내보내기</h3>
    <label>기간 선택</label>
    <select id="pdfRange">
      <option value="1">최근 1개월</option>
      <option value="3">최근 3개월</option>
      <option value="6" selected>최근 6개월</option>
      <option value="12">최근 12개월</option>
      <option value="all">전체 기록</option>
    </select>
    <div class="modal-info" id="pdfInfo"></div>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closePdfModal()">취소</button>
      <button class="modal-confirm" onclick="exportPDF()">PDF 생성</button>
    </div>
  </div>
</div>

<div class="bottom-nav">
  <button class="nav-btn" id="navList" onclick="toggleSidebar()">
    <span class="nav-icon">📋</span>
    <span>목록</span>
  </button>
  <button class="nav-btn nav-write" onclick="newEntryMobile()">
    <span class="nav-icon">✏️</span>
    <span>새 일기</span>
  </button>
  <button class="nav-btn" onclick="openPdfModal()">
    <span class="nav-icon">📄</span>
    <span>PDF</span>
  </button>
</div>

<script>
// ── Mobile ─────────────────────────────────────────────
function toggleSidebar() {
  const sb = document.querySelector('.sidebar');
  const btn = document.getElementById('navList');
  const isOpen = sb.classList.toggle('open');
  btn.classList.toggle('active', isOpen);
  if (isOpen) {
    // 바깥 클릭시 닫기
    setTimeout(() => document.addEventListener('click', closeSidebarOutside, {once:true}), 10);
  }
}
function closeSidebarOutside(e) {
  const sb = document.querySelector('.sidebar');
  if (!sb.contains(e.target) && !document.getElementById('navList').contains(e.target)) {
    sb.classList.remove('open');
    document.getElementById('navList').classList.remove('active');
  }
}
function newEntryMobile() {
  newEntry();
  document.querySelector('.sidebar').classList.remove('open');
  document.getElementById('navList').classList.remove('active');
}

// entry 클릭시 모바일에서 목록 닫기
const origLoadEntry = loadEntry;
function loadEntry(id) {
  origLoadEntry(id);
  document.querySelector('.sidebar')?.classList.remove('open');
  document.getElementById('navList')?.classList.remove('active');
}


let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('installBanner').classList.add('show');
});
document.getElementById('installBtn').addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  deferredPrompt = null;
  document.getElementById('installBanner').classList.remove('show');
  if (outcome === 'accepted') showToast('홈 화면에 추가되었어요! 📔');
});
window.addEventListener('appinstalled', () => document.getElementById('installBanner').classList.remove('show'));
function dismissBanner() { document.getElementById('installBanner').classList.remove('show'); deferredPrompt = null; }

// ── App State ──────────────────────────────────────────
let entries = JSON.parse(localStorage.getItem('diary_entries') || '[]');
let currentId = null;
let selectedMoods = [];
const WEEKDAYS = ['일요일','월요일','화요일','수요일','목요일','금요일','토요일'];
const MONTHS = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

function init() {
  renderHeader(new Date());
  renderList();
  updateCharCount();
  document.getElementById('contentTextarea').addEventListener('input', updateCharCount);
}

function renderHeader(date) {
  document.getElementById('dateDisplay').textContent = `${date.getFullYear()}년 ${MONTHS[date.getMonth()]} ${date.getDate()}일`;
  document.getElementById('weekdayDisplay').textContent = WEEKDAYS[date.getDay()];
  document.getElementById('datePicker').value = toDateKey(date);
}

function onDateChange(val) {
  if (!val) return;
  const [y,m,d] = val.split('-').map(Number);
  const date = new Date(y, m-1, d);
  renderHeader(date);
  // 해당 날짜 일기가 있으면 자동으로 불러오기
  const existing = entries.find(e => e.dateKey === val);
  if (existing) {
    loadEntry(existing.id);
  } else {
    // 새 날짜로 새 일기 준비 (currentId만 초기화, 날짜는 유지)
    currentId = null; selectedMoods = [];
    document.getElementById('titleInput').value = '';
    document.getElementById('contentTextarea').value = '';
    document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('selected'));
    document.getElementById('deleteBtn').style.display = 'none';
    resetSaveBtn(); updateCharCount();
    renderList(document.getElementById('searchBox').value.trim());
  }
}

function renderList(filter = '') {
  const list = document.getElementById('entriesList');
  const sorted = [...entries].sort((a,b) => b.dateKey.localeCompare(a.dateKey));
  const filtered = filter ? sorted.filter(e => e.content.includes(filter)||e.title.includes(filter)||e.dateLabel.includes(filter)) : sorted;
  document.getElementById('entryCount').textContent = entries.length;
  if (!filtered.length) {
    list.innerHTML = `<div class="no-entries">${filter ? '검색 결과가 없어요.' : '아직 기록이 없어요.<br>새 일기를 써보세요 ✍️'}</div>`;
    return;
  }
  list.innerHTML = filtered.map(e => `
    <div class="entry-item ${e.id===currentId?'active':''}" onclick="loadEntry('${e.id}')">
      <div class="date-label">${e.dateLabel} ${e.moods&&e.moods.length?e.moods[0].split(' ')[0]:''}</div>
      <div class="preview">${e.title||e.content.replace(/\n/g,' ').trim()||'(내용 없음)'}</div>
    </div>`).join('');
}

function filterEntries() { renderList(document.getElementById('searchBox').value.trim()); }

function newEntry() {
  currentId = null; selectedMoods = [];
  document.getElementById('titleInput').value = '';
  document.getElementById('contentTextarea').value = '';
  document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('selected'));
  document.getElementById('deleteBtn').style.display = 'none';
  resetSaveBtn(); renderHeader(new Date()); updateCharCount();
  renderList(document.getElementById('searchBox').value.trim());
  document.getElementById('contentTextarea').focus();
}

function loadEntry(id) {
  const entry = entries.find(e => e.id===id);
  if (!entry) return;
  currentId = id; selectedMoods = entry.moods||[];
  const [y,m,d] = entry.dateKey.split('-').map(Number);
  renderHeader(new Date(y,m-1,d));
  document.getElementById('titleInput').value = entry.title||'';
  document.getElementById('contentTextarea').value = entry.content||'';
  document.querySelectorAll('.mood-btn').forEach(b => b.classList.toggle('selected', selectedMoods.includes(b.textContent.trim())));
  document.getElementById('deleteBtn').style.display = 'inline-flex';
  resetSaveBtn(); updateCharCount();
  renderList(document.getElementById('searchBox').value.trim());
}

function saveEntry() {
  const content = document.getElementById('contentTextarea').value.trim();
  const title = document.getElementById('titleInput').value.trim();
  if (!content && !title) { showToast('내용을 먼저 입력해주세요.'); return; }
  const pickerVal = document.getElementById('datePicker').value;
  const now = new Date();
  const saveDate = pickerVal ? (() => { const [y,m,d]=pickerVal.split('-').map(Number); return new Date(y,m-1,d); })() : now;
  const dateKey = toDateKey(saveDate);
  const dateLabel = `${saveDate.getFullYear()}.${String(saveDate.getMonth()+1).padStart(2,'0')}.${String(saveDate.getDate()).padStart(2,'0')}`;
  if (currentId) {
    const idx = entries.findIndex(e => e.id===currentId);
    if (idx!==-1) entries[idx] = {...entries[idx], title, content, moods:selectedMoods, updatedAt:now.toISOString()};
  } else {
    const newId = 'diary_'+Date.now();
    entries.push({id:newId, dateKey, dateLabel, title, content, moods:selectedMoods, createdAt:now.toISOString()});
    currentId = newId;
  }
  persist(); renderList(document.getElementById('searchBox').value.trim());
  document.getElementById('deleteBtn').style.display = 'inline-flex';
  const btn = document.getElementById('saveBtn');
  btn.textContent = '저장됨 ✓'; btn.classList.add('saved');
  setTimeout(resetSaveBtn, 2000);
  showToast('일기가 저장되었어요.');
}

function resetSaveBtn() { const b=document.getElementById('saveBtn'); b.textContent='저장하기'; b.classList.remove('saved'); }

function deleteEntry() {
  if (!currentId||!confirm('이 일기를 삭제할까요?')) return;
  entries = entries.filter(e=>e.id!==currentId);
  persist(); newEntry(); showToast('일기가 삭제되었어요.');
}

function toggleMood(btn, mood) {
  btn.classList.toggle('selected');
  if (btn.classList.contains('selected')) selectedMoods.push(mood);
  else selectedMoods = selectedMoods.filter(m=>m!==mood);
}

function toDateKey(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function updateCharCount() { document.getElementById('charCount').textContent = `${document.getElementById('contentTextarea').value.length.toLocaleString()}자`; }
function persist() { localStorage.setItem('diary_entries', JSON.stringify(entries)); }
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}

// ── PDF ────────────────────────────────────────────────
function openPdfModal() { updatePdfInfo(); document.getElementById('pdfModal').classList.add('open'); }
function closePdfModal() { document.getElementById('pdfModal').classList.remove('open'); }
document.getElementById('pdfRange').addEventListener('change', updatePdfInfo);
function updatePdfInfo() {
  const range = document.getElementById('pdfRange').value;
  const n = getEntriesForRange(range).length;
  const label = range==='all'?'전체':`최근 ${range}개월`;
  document.getElementById('pdfInfo').innerHTML = `<strong>${label}</strong> 기간의 일기 <strong>${n}개</strong>가 PDF로 저장됩니다.`;
}
function getEntriesForRange(range) {
  if (range==='all') return [...entries].sort((a,b)=>a.dateKey.localeCompare(b.dateKey));
  const cutoff = new Date(); cutoff.setMonth(cutoff.getMonth()-parseInt(range));
  return [...entries].filter(e=>e.dateKey>=toDateKey(cutoff)).sort((a,b)=>a.dateKey.localeCompare(b.dateKey));
}

async function exportPDF() {
  const range = document.getElementById('pdfRange').value;
  const filtered = getEntriesForRange(range);
  if (!filtered.length) { showToast('해당 기간에 일기가 없어요.'); closePdfModal(); return; }
  closePdfModal(); showToast('PDF를 생성하고 있어요...');

  const {jsPDF} = window.jspdf;
  const doc = new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  const [pW,pH,mL,mR,mT,mB] = [210,297,22,22,28,28];
  const cW = pW-mL-mR;

  doc.setFillColor(26,20,16); doc.rect(0,0,pW,pH,'F');
  doc.setDrawColor(200,169,110); doc.setLineWidth(0.4); doc.rect(12,12,pW-24,pH-24);
  doc.setTextColor(200,169,110); doc.setFontSize(28); doc.setFont('helvetica','bold');
  doc.text('나의 일기장', pW/2, 110, {align:'center'});
  doc.setFontSize(10); doc.setFont('helvetica','normal'); doc.setTextColor(160,140,120);
  doc.text('My Private Diary', pW/2, 122, {align:'center'});
  doc.setDrawColor(200,169,110); doc.setLineWidth(0.3); doc.line(60,130,pW-60,130);
  const now = new Date();
  doc.setFontSize(9); doc.setTextColor(140,120,100);
  doc.text(range==='all'?'전체 기록':`최근 ${range}개월`, pW/2, 142, {align:'center'});
  doc.text(`총 ${filtered.length}편`, pW/2, 151, {align:'center'});
  doc.setFontSize(8); doc.setTextColor(100,90,80);
  doc.text(`${now.getFullYear()}년 ${now.getMonth()+1}월 ${now.getDate()}일 생성`, pW/2, 270, {align:'center'});

  filtered.forEach((entry,idx) => {
    doc.addPage();
    doc.setFillColor(250,246,240); doc.rect(0,0,pW,22,'F');
    doc.setDrawColor(220,210,200); doc.setLineWidth(0.2); doc.line(0,22,pW,22);
    doc.setFontSize(10); doc.setFont('helvetica','bold'); doc.setTextColor(139,69,19);
    doc.text(entry.dateLabel, mL, 14);
    if (entry.title) { doc.setFontSize(9); doc.setFont('helvetica','normal'); doc.setTextColor(100,90,80); doc.text('│ '+entry.title, mL+doc.getTextWidth(entry.dateLabel)+8, 14); }
    if (entry.moods&&entry.moods.length) { doc.setFontSize(7.5); doc.setTextColor(140,120,100); doc.text(entry.moods.join('  '), pW-mR, 14, {align:'right'}); }
    doc.setFontSize(7); doc.setTextColor(180,170,160); doc.text(`${idx+1} / ${filtered.length}`, pW-mR, pH-14, {align:'right'});
    doc.setDrawColor(232,221,208); doc.setLineWidth(0.15);
    for (let y=mT+8;y<pH-mB;y+=8) doc.line(mL,y,pW-mR,y);
    doc.setDrawColor(200,169,110); doc.setLineWidth(0.25); doc.line(mL-4,mT,mL-4,pH-mB);
    doc.setFont('helvetica','normal'); doc.setFontSize(10); doc.setTextColor(26,20,16);
    const lines = doc.splitTextToSize(entry.content||'', cW);
    let y = mT+6;
    lines.forEach(line => {
      if (y > pH-mB-8) {
        doc.addPage();
        doc.setFillColor(250,246,240); doc.rect(0,0,pW,22,'F');
        doc.setDrawColor(220,210,200); doc.line(0,22,pW,22);
        doc.setFontSize(9); doc.setFont('helvetica','italic'); doc.setTextColor(160,140,120);
        doc.text(entry.dateLabel+' (계속)', mL, 14);
        doc.setDrawColor(232,221,208); doc.setLineWidth(0.15);
        for (let ry=mT+8;ry<pH-mB;ry+=8) doc.line(mL,ry,pW-mR,ry);
        doc.setDrawColor(200,169,110); doc.setLineWidth(0.25); doc.line(mL-4,mT,mL-4,pH-mB);
        y=mT+6; doc.setFontSize(10); doc.setTextColor(26,20,16); doc.setFont('helvetica','normal');
      }
      doc.text(line,mL,y); y+=8;
    });
    doc.setFontSize(7); doc.setTextColor(180,170,160);
    doc.text(entry.updatedAt?`수정: ${entry.updatedAt.slice(0,10)}`:`작성: ${(entry.createdAt||entry.dateKey).slice(0,10)}`, mL, pH-14);
  });

  doc.addPage();
  doc.setFillColor(26,20,16); doc.rect(0,0,pW,pH,'F');
  doc.setDrawColor(200,169,110); doc.setLineWidth(0.4); doc.rect(12,12,pW-24,pH-24);
  doc.setFontSize(9); doc.setTextColor(100,90,80); doc.text('End of Diary', pW/2, pH/2, {align:'center'});

  doc.save(`나의일기장_${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}.pdf`);
  showToast(`PDF 저장 완료! (${filtered.length}편)`);
}

init();
</script>
</body>
</html>
